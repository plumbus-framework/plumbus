<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#533483;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  <rect width="800" height="200" rx="12" fill="url(#bg)"/>
  <rect x="0" y="186" width="800" height="4" rx="2" fill="url(#accent)"/>
  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="320" y1="0" x2="320" y2="200"/>
    <line x1="480" y1="0" x2="480" y2="200"/>
    <line x1="640" y1="0" x2="640" y2="200"/>
  </g>
  <!-- Decorative nodes -->
  <circle cx="680" cy="45" r="4" fill="#e94560" opacity="0.6"/>
  <circle cx="720" cy="70" r="3" fill="#533483" opacity="0.5"/>
  <circle cx="700" cy="95" r="5" fill="#0f3460" opacity="0.6"/>
  <circle cx="740" cy="120" r="3" fill="#e94560" opacity="0.4"/>
  <circle cx="660" cy="80" r="3" fill="#533483" opacity="0.4"/>
  <line x1="680" y1="45" x2="720" y2="70" stroke="#533483" stroke-width="0.8" opacity="0.3"/>
  <line x1="720" y1="70" x2="700" y2="95" stroke="#533483" stroke-width="0.8" opacity="0.3"/>
  <line x1="700" y1="95" x2="740" y2="120" stroke="#533483" stroke-width="0.8" opacity="0.3"/>
  <line x1="660" y1="80" x2="700" y2="95" stroke="#533483" stroke-width="0.8" opacity="0.3"/>
  <line x1="680" y1="45" x2="660" y2="80" stroke="#533483" stroke-width="0.8" opacity="0.3"/>
  <!-- Icon: hexagon -->
  <g transform="translate(60, 100)">
    <polygon points="0,-30 26,-15 26,15 0,30 -26,15 -26,-15" fill="none" stroke="#e94560" stroke-width="2" opacity="0.8"/>
    <polygon points="0,-18 15.6,-9 15.6,9 0,18 -15.6,9 -15.6,-9" fill="#e94560" opacity="0.15"/>
    <text x="0" y="6" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="20" font-weight="bold">P</text>
  </g>
  <!-- Title -->
  <text x="110" y="90" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" letter-spacing="-1">Plumbus</text>
  <!-- Subtitle -->
  <text x="112" y="120" fill="#a0a0b8" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400">AI-Native Application Framework for TypeScript</text>
  <!-- Tags -->
  <g transform="translate(112, 140)">
    <rect x="0" y="0" width="90" height="22" rx="11" fill="#e94560" opacity="0.15"/>
    <text x="45" y="15" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="10">Capabilities</text>
    <rect x="98" y="0" width="62" height="22" rx="11" fill="#533483" opacity="0.15"/>
    <text x="129" y="15" text-anchor="middle" fill="#9a6dd7" font-family="monospace" font-size="10">Entities</text>
    <rect x="168" y="0" width="52" height="22" rx="11" fill="#0f3460" opacity="0.15"/>
    <text x="194" y="15" text-anchor="middle" fill="#4a90d9" font-family="monospace" font-size="10">Flows</text>
    <rect x="228" y="0" width="58" height="22" rx="11" fill="#e94560" opacity="0.15"/>
    <text x="257" y="15" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="10">Events</text>
    <rect x="294" y="0" width="35" height="22" rx="11" fill="#533483" opacity="0.15"/>
    <text x="311" y="15" text-anchor="middle" fill="#9a6dd7" font-family="monospace" font-size="10">AI</text>
  </g>
</svg>
